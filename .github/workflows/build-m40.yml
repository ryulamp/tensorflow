name: Build TensorFlow for M40 GPU

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: 'Python version (py310, py311, py312, py313)'
        required: true
        default: 'py313'
  push:
    branches: [ master ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build-m40-wheel:
    name: Build TF wheel for M40 (sm_52)
    runs-on: ubuntu-24.04
    env:
      PIP_NO_CACHE_DIR: 1
    defaults:
      run:
        shell: bash
    container:
      image: us-docker.pkg.dev/ml-oss-artifacts-published/ml-public-container/ml-build:latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        env:
          GIT_CONFIG_PARAMETERS: "'checkout.workers=12' 'core.featureManyFiles=true'"
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
          fetch-depth: 1

      - name: Configure Bazel cache
        run: |
          echo "build --config=tf_public_cache" >> .bazelrc

      - name: Build TensorFlow wheel for M40 GPU
        env:
          TFCI: ${{ github.event.inputs.python_version || 'py313' }},linux_x86_cuda_m40,no_docker
          TFCI_GITHUB_ACTIONS: true
        run: ./ci/official/wheel.sh

      - name: Upload M40 wheel artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: "tensorflow-m40-wheel-${{ github.run_number }}-${{ github.run_attempt }}"
          path: build_output/*.whl
          if-no-files-warn: warn
